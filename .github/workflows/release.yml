name: Release

# Trigger contract: push a version tag like `v0.1.0`. Nothing runs on ordinary
# pushes or PRs — only tags matching `v*` build and publish (no wasted CI).
on:
  push:
    tags:
      - 'v*'

# tauri-action creates the GitHub Release and uploads assets, which needs write
# access to repository contents.
permissions:
  contents: write

jobs:
  publish-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS: build both Apple Silicon and Intel.
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          # Linux.
          - platform: 'ubuntu-22.04'
            args: ''
          # Windows.
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install

      # Builds the frontend (beforeBuildCommand: `pnpm build`), compiles the
      # Tauri app per-OS, then creates/updates the Release and uploads installers.
      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'claude-copet ${{ github.ref_name }}'
          releaseBody: 'Cross-platform builds (macOS · Linux · Windows). See the assets below. Unsigned — see docs/release.md for opening notes.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
